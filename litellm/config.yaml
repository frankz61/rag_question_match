  # ========== 本地模型 (Ollama) ==========
  # 取消注释以启用本地模型
  # - model_name: llama2
  #   litellm_params:
  #     model: ollama/llama2
  #     api_base: http://host.docker.internal:11434
  #   model_info:
  #     description: "本地 Llama2 (Ollama)"

# --------------------------------------------
# 路由设置
# --------------------------------------------
router_settings:
  # 路由策略: simple-shuffle / least-busy / latency-based-routing / cost-based-routing
  routing_strategy: latency-based-routing
  
  # 回退配置：主模型失败时自动切换到备用模型
  # 触发回退的错误类型: RateLimitError(429), APIError, Timeout, ServiceUnavailableError
  fallbacks:
    - gpt-4: [deepseek-chat, qwen-max, glm-4-plus]
    - gpt-4-turbo: [gpt-4o, deepseek-chat, qwen-max]
    - gpt-4o: [deepseek-chat, qwen-max, glm-4-plus]
    - gpt-4o-mini: [deepseek-chat, qwen-turbo, glm-4-flash]
    - gpt-3.5-turbo: [qwen-turbo, deepseek-chat, glm-4-flash, moonshot-v1-8k]
    - deepseek-chat: [qwen-max, gpt-4o, glm-4-plus]
    - deepseek-reasoner: [qwen-max, gpt-4o, glm-4-plus]
    - qwen-max: [deepseek-chat, gpt-4o, glm-4-plus]
    - glm-4-plus: [deepseek-chat, qwen-max, gpt-4o]
    - moonshot-v1-8k: [qwen-turbo, deepseek-chat, glm-4-flash]
    - doubao-pro-32k: [qwen-plus, deepseek-chat, glm-4]
  
  # 重试配置
  num_retries: 3
  retry_after: 5
  
  # 超时设置 (秒)
  timeout: 120
  
  # 限流时允许的重试次数（针对 429 错误）
  allowed_fails: 3
  
  # 冷却时间：模型失败后暂时禁用的秒数，避免持续请求限流的模型
  cooldown_time: 60
  
  # 模型别名（可选）
  model_group_alias:
    gpt4: gpt-4
    gpt4o: gpt-4o
    gpt35: gpt-3.5-turbo
    deepseek: deepseek-chat
    qwen: qwen-max
    glm: glm-4-plus
    moonshot: moonshot-v1-8k
    doubao: doubao-pro-32k

# --------------------------------------------
# LiteLLM 设置
# --------------------------------------------
litellm_settings:
  # 全局预算设置（可选，更推荐在 Key 级别设置）
  # max_budget: 10000
  # budget_duration: 30d
  
  # 启用请求/响应日志
  set_verbose: false
  
  # 丢弃无效参数而非报错
  drop_params: true

# --------------------------------------------
# 环境变量（可在此处定义，也可通过 .env 文件）
# --------------------------------------------
environment_variables:
  # 使用 .env 文件管理，此处留空
