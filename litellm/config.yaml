# ============================================
# LiteLLM 企业级网关配置文件
# ============================================

# --------------------------------------------
# 通用设置
# --------------------------------------------
general_settings:
  # Master Key 从环境变量读取
  master_key: os.environ/LITELLM_MASTER_KEY
  # 数据库连接从环境变量读取
  database_url: os.environ/DATABASE_URL
  # 允许模型配置存入数据库（支持 Admin UI 动态管理）
  store_model_in_db: true

# --------------------------------------------
# 模型列表配置
# --------------------------------------------
model_list:
  # ========== OpenAI 模型 ==========
  - model_name: gpt-4
    litellm_params:
      model: openai/gpt-4
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      description: "OpenAI GPT-4"

  - model_name: gpt-4-turbo
    litellm_params:
      model: openai/gpt-4-turbo
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      description: "OpenAI GPT-4 Turbo"

  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      description: "OpenAI GPT-4o"

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      description: "OpenAI GPT-4o Mini (快速响应)"

  - model_name: gpt-3.5-turbo
    litellm_params:
      model: openai/gpt-3.5-turbo
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      description: "OpenAI GPT-3.5 Turbo"

  # ========== DeepSeek 模型 ==========
  # 使用 deepseek/ 原生前缀，更好支持特殊功能
  - model_name: deepseek-chat
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY
    model_info:
      description: "DeepSeek Chat"

  - model_name: deepseek-coder
    litellm_params:
      model: deepseek/deepseek-coder
      api_key: os.environ/DEEPSEEK_API_KEY
    model_info:
      description: "DeepSeek Coder (代码生成)"

  - model_name: deepseek-reasoner
    litellm_params:
      model: deepseek/deepseek-reasoner
      api_key: os.environ/DEEPSEEK_API_KEY
    model_info:
      description: "DeepSeek Reasoner (R1推理模型，支持思考过程输出)"

  # ========== 阿里云 Qwen 模型 ==========
  - model_name: qwen-max
    litellm_params:
      model: openai/qwen-max
      api_key: os.environ/QWEN_API_KEY
      api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
    model_info:
      description: "阿里云通义千问 Max"

  - model_name: qwen-plus
    litellm_params:
      model: openai/qwen-plus
      api_key: os.environ/QWEN_API_KEY
      api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
    model_info:
      description: "阿里云通义千问 Plus"

  - model_name: qwen-turbo
    litellm_params:
      model: openai/qwen-turbo
      api_key: os.environ/QWEN_API_KEY
      api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
    model_info:
      description: "阿里云通义千问 Turbo (快速响应)"

  # ========== 智谱AI GLM 模型 ==========
